<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Макс Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0B141A;
            height: 100vh;
            overflow: hidden;
        }
        
        /* АВТОРИЗАЦИЯ */
        .auth-screen {
            max-width: 400px;
            margin: 0 auto;
            background: #111B21;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }
        .auth-screen h1 {
            color: #25D366;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2em;
        }
        .auth-screen input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #202C33;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .auth-screen button {
            width: 100%;
            padding: 15px;
            background: #25D366;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #25D366;
            cursor: pointer;
        }
        .test-badge {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #202C33;
            border-radius: 10px;
            color: #8696A0;
            font-size: 12px;
        }
        
        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .main-screen {
            max-width: 500px;
            margin: 0 auto;
            background: #111B21;
            height: 100vh;
            display: none;
            flex-direction: column;
        }
        .header {
            background: #202C33;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
        }
        .icon-btn {
            background: #25D366;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 5px;
        }
        .logout-btn { background: #dc3545; }
        
        /* Боковое меню */
        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #111B21;
            z-index: 200;
            transition: left 0.3s;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .side-menu.open { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            display: none;
        }
        .menu-overlay.open { display: block; }
        .menu-header {
            background: #202C33;
            padding: 30px;
            text-align: center;
        }
        .menu-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #25D366;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            overflow: hidden;
        }
        .menu-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .menu-username { font-size: 18px; font-weight: bold; color: white; }
        .menu-bio { font-size: 12px; color: #8696A0; margin-top: 5px; }
        .menu-item {
            padding: 15px 20px;
            color: #E9EDEF;
            cursor: pointer;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #202C33;
        }
        .menu-item:hover { background: #2A3942; }
        
        /* Список чатов */
        .sidebar {
            flex: 1;
            overflow-y: auto;
        }
        .section-title {
            padding: 15px 20px 5px;
            color: #8696A0;
            font-size: 12px;
        }
        .user-item, .group-item {
            padding: 12px 20px;
            border-bottom: 1px solid #202C33;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-item:hover, .group-item:hover { background: #2A3942; }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { flex: 1; }
        .item-name { font-weight: 500; color: #E9EDEF; }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #25D366;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }
        
        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0B141A;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            word-wrap: break-word;
        }
        .message.own { align-self: flex-end; background: #005C4B; color: white; }
        .message.other { align-self: flex-start; background: #202C33; color: #E9EDEF; }
        .message-info { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        
        /* Поле ввода */
        .input-area {
            background: #202C33;
            padding: 15px;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #2A3942;
            color: white;
        }
        .input-area button {
            background: #25D366;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #111B21;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            color: white;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #202C33;
            border: none;
            border-radius: 8px;
            color: white;
        }
        .modal-content button {
            background: #25D366;
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .chat-area {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
                display: none;
            }
            .chat-area.active { display: flex; }
            .back-btn {
                background: none;
                border: none;
                color: white;
                font-size: 24px;
                cursor: pointer;
                margin-right: 10px;
            }
        }
    </style>
</head>
<body>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="authScreen" class="auth-screen">
    <h1>💬 Макс Мессенджер</h1>
    <input type="text" id="loginUsername" placeholder="Имя пользователя" value="testuser">
    <input type="password" id="loginPassword" placeholder="Пароль" value="test123">
    <button onclick="doLogin()">Вход</button>
    <div class="auth-switch" onclick="showRegister()">Нет аккаунта? Регистрация</div>
    <div class="test-badge">🧪 Тестовый аккаунт: testuser / test123</div>
</div>

<!-- ОСНОВНОЙ ЭКРАН -->
<div id="mainScreen" class="main-screen">
    <div class="header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <span id="chatTitle">Макс Мессенджер</span>
        <button id="exitChatBtn" class="icon-btn" onclick="closeCurrentChat()" style="display:none">🏠 Главная</button>
        <button class="icon-btn logout-btn" onclick="logout()">🚪</button>
    </div>
    
    <div style="display: flex; flex: 1; overflow: hidden;">
        <div id="sidebar" class="sidebar"></div>
        
        <div id="chatArea" class="chat-area">
            <div class="header" style="padding: 10px;">
                <button class="back-btn" id="backBtn" onclick="closeCurrentChat()" style="display:none">←</button>
                <h3 id="currentChatName">Выберите чат</h3>
            </div>
            <div id="messagesList" class="messages">
                <div style="text-align:center;padding:40px;color:#8696A0">👈 Выберите чат из списка</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key=='Enter') sendMessage()">
                <button onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>
</div>

<!-- БОКОВОЕ МЕНЮ -->
<div id="sideMenu" class="side-menu">
    <div class="menu-header">
        <div id="menuAvatar" class="menu-avatar" onclick="openProfileModal()">👤</div>
        <div id="menuUsername" class="menu-username"></div>
        <div id="menuBio" class="menu-bio"></div>
    </div>
    <div class="menu-item" onclick="closeMenu(); showCreateGroupModal()">➕ Создать группу</div>
    <div class="menu-item" onclick="closeMenu(); openProfileModal()">👤 Мой профиль</div>
    <div class="menu-item" onclick="closeMenu(); refreshData()">🔄 Обновить</div>
    <div class="menu-item" onclick="logout()">🚪 Выйти</div>
</div>
<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>

<!-- МОДАЛКА ПРОФИЛЯ -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <h3>Редактировать профиль</h3>
        <div id="profileAvatar" class="menu-avatar" style="width:80px;height:80px;margin:10px auto" onclick="document.getElementById('avatarFile').click()">📷</div>
        <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="previewAvatar(this)">
        <textarea id="profileBio" placeholder="О себе" rows="3"></textarea>
        <button onclick="updateProfile()">Сохранить</button>
        <button onclick="closeModal('profileModal')">Отмена</button>
    </div>
</div>

<!-- МОДАЛКА СОЗДАНИЯ ГРУППЫ -->
<div id="createGroupModal" class="modal">
    <div class="modal-content">
        <h3>Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название">
        <textarea id="groupDesc" placeholder="Описание"></textarea>
        <button onclick="createGroup()">Создать</button>
        <button onclick="closeModal('createGroupModal')">Отмена</button>
    </div>
</div>

<script>
    let ws = null;
    let currentUser = null;
    let currentChat = null;
    let currentChatType = null; // 'private' or 'group'
    let currentGroupId = null;
    let allUsers = [];
    let userGroups = [];
    let isMobile = window.innerWidth <= 768;
    
    // ========== WEBSOCKET ==========
    function connectWS() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${protocol}//${location.host}/ws/${currentUser}`;
        console.log("🔄 Подключение к WS:", url);
        
        ws = new WebSocket(url);
        
        ws.onopen = () => {
            console.log("✅ WebSocket подключен!");
        };
        
        ws.onmessage = (event) => {
            console.log("📩 Получено:", event.data);
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'users') {
                    allUsers = data.users;
                    renderSidebar();
                }
                else if (data.type === 'private') {
                    if (currentChatType === 'private' && currentChat === data.from) {
                        addMessage(data.from, data.message, data.time, false);
                    }
                    renderSidebar();
                }
                else if (data.type === 'group') {
                    if (currentChatType === 'group' && currentGroupId === data.group_id) {
                        addMessage(data.from, data.message, data.time, data.is_own);
                    }
                }
            } catch(e) { console.error(e); }
        };
        
        ws.onerror = (err) => { console.error("WS ошибка:", err); };
        ws.onclose = () => {
            console.log("WS закрыт, переподключение через 3 сек...");
            setTimeout(connectWS, 3000);
        };
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    async function doLogin() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        const res = await fetch(`/login?username=${username}&password=${password}`, { method: 'POST' });
        if (res.ok) {
            currentUser = username;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('menuUsername').innerText = username;
            await loadUserData();
            connectWS();
            await loadGroups();
            renderSidebar();
        } else {
            alert("Неверный логин или пароль");
        }
    }
    
    function showRegister() {
        const authDiv = document.getElementById('authScreen');
        authDiv.innerHTML = `
            <h1>💬 Регистрация</h1>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="doRegister()">Зарегистрироваться</button>
            <div class="auth-switch" onclick="location.reload()">Уже есть аккаунт? Вход</div>
        `;
    }
    
    async function doRegister() {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const res = await fetch(`/register?username=${username}&password=${password}`, { method: 'POST' });
        if (res.ok) {
            alert("Регистрация успешна! Теперь войдите.");
            location.reload();
        } else {
            alert("Ошибка: пользователь уже существует");
        }
    }
    
    async function loadUserData() {
        const res = await fetch(`/profile/${currentUser}`);
        const data = await res.json();
        document.getElementById('menuBio').innerText = data.bio || "Нет информации";
        const avatarDiv = document.getElementById('menuAvatar');
        if (data.avatar && data.avatar.startsWith('data:')) {
            avatarDiv.innerHTML = `<img src="${data.avatar}">`;
        } else {
            avatarDiv.innerHTML = currentUser.charAt(0).toUpperCase();
        }
    }
    
    async function loadGroups() {
        const res = await fetch(`/groups/${currentUser}`);
        userGroups = await res.json();
        renderSidebar();
    }
    
    // ========== ОТРИСОВКА СПИСКА ЧАТОВ ==========
    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        let html = '<div class="section-title">💬 ЛИЧНЫЕ СООБЩЕНИЯ</div>';
        
        const otherUsers = allUsers.filter(u => u.username !== currentUser);
        if (otherUsers.length === 0) {
            html += '<div style="padding:20px;color:#8696A0">Нет других пользователей</div>';
        } else {
            otherUsers.forEach(u => {
                const avatarHtml = (u.avatar && u.avatar.startsWith('data:')) ? 
                    `<img src="${u.avatar}">` : u.username.charAt(0).toUpperCase();
                html += `
                    <div class="user-item" onclick="openPrivateChat('${u.username}')">
                        <div class="avatar">${avatarHtml}</div>
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(u.username)} <span class="online-dot"></span></div>
                            <div style="font-size:12px;color:#8696A0">${escapeHtml(u.bio || 'Онлайн')}</div>
                        </div>
                    </div>
                `;
            });
        }
        
        html += '<div class="section-title">👥 ГРУППОВЫЕ ЧАТЫ</div>';
        if (userGroups.length === 0) {
            html += '<div style="padding:20px;color:#8696A0">Нет групп. Нажмите ☰ → Создать группу</div>';
        } else {
            userGroups.forEach(g => {
                html += `
                    <div class="group-item" onclick="openGroupChat(${g.id}, '${escapeHtml(g.name)}')">
                        <div class="avatar" style="background:#667781">${g.name.charAt(0).toUpperCase()}</div>
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(g.name)}</div>
                            <div style="font-size:12px;color:#8696A0">${escapeHtml(g.description || 'Групповой чат')}</div>
                        </div>
                    </div>
                `;
            });
        }
        
        sidebar.innerHTML = html;
    }
    
    // ========== ОТКРЫТИЕ ЧАТОВ ==========
    async function openPrivateChat(username) {
        currentChatType = 'private';
        currentChat = username;
        currentGroupId = null;
        document.getElementById('currentChatName').innerText = username;
        document.getElementById('chatTitle').innerText = username;
        document.getElementById('exitChatBtn').style.display = 'block';
        
        const res = await fetch(`/history/${currentUser}/${username}`);
        const history = await res.json();
        
        const container = document.getElementById('messagesList');
        container.innerHTML = '';
        if (history.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#8696A0">Нет сообщений. Напишите первое!</div>';
        }
        history.forEach(msg => addMessage(msg.from, msg.text, msg.time, msg.from === currentUser));
        
        if (isMobile) {
            document.getElementById('chatArea').classList.add('active');
            document.getElementById('backBtn').style.display = 'block';
        }
    }
    
    async function openGroupChat(groupId, groupName) {
        currentChatType = 'group';
        currentGroupId = groupId;
        currentChat = groupName;
        document.getElementById('currentChatName').innerText = groupName;
        document.getElementById('chatTitle').innerText = groupName;
        document.getElementById('exitChatBtn').style.display = 'block';
        
        const res = await fetch(`/group/history/${groupId}`);
        const history = await res.json();
        
        const container = document.getElementById('messagesList');
        container.innerHTML = '';
        if (history.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#8696A0">Нет сообщений. Напишите первое!</div>';
        }
        history.forEach(msg => addMessage(msg.from, msg.text, msg.time, msg.from === currentUser));
        
        if (isMobile) {
            document.getElementById('chatArea').classList.add('active');
            document.getElementById('backBtn').style.display = 'block';
        }
    }
    
    function closeCurrentChat() {
        currentChat = null;
        currentChatType = null;
        currentGroupId = null;
        document.getElementById('exitChatBtn').style.display = 'none';
        document.getElementById('chatArea').classList.remove('active');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('currentChatName').innerText = 'Выберите чат';
        document.getElementById('chatTitle').innerText = 'Макс Мессенджер';
        document.getElementById('messagesList').innerHTML = '<div style="text-align:center;padding:40px;color:#8696A0">👈 Выберите чат из списка</div>';
    }
    
    // ========== ОТПРАВКА СООБЩЕНИЙ ==========
    function addMessage(from, text, time, isOwn) {
        const container = document.getElementById('messagesList');
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        div.innerHTML = `<div><strong>${isOwn ? 'Вы' : escapeHtml(from)}</strong>: ${escapeHtml(text)}</div>
                        <div class="message-info">${time || new Date().toLocaleTimeString()}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("Нет соединения с сервером");
            return;
        }
        
        if (currentChatType === 'private' && currentChat) {
            ws.send(JSON.stringify({ type: 'private', to: currentChat, message: text }));
            input.value = '';
            addMessage(currentUser, text, new Date().toLocaleTimeString(), true);
        } else if (currentChatType === 'group' && currentGroupId) {
            ws.send(JSON.stringify({ type: 'group', group_id: currentGroupId, message: text }));
            input.value = '';
        } else {
            alert("Сначала выберите чат");
        }
    }
    
    // ========== ПРОФИЛЬ ==========
    function openProfileModal() {
        closeMenu();
        document.getElementById('profileModal').style.display = 'flex';
        loadUserDataForModal();
    }
    
    async function loadUserDataForModal() {
        const res = await fetch(`/profile/${currentUser}`);
        const data = await res.json();
        document.getElementById('profileBio').value = data.bio || '';
        const avatarDiv = document.getElementById('profileAvatar');
        if (data.avatar && data.avatar.startsWith('data:')) {
            avatarDiv.innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;object-fit:cover">`;
        } else {
            avatarDiv.innerHTML = currentUser.charAt(0).toUpperCase();
        }
    }
    
    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('profileAvatar').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    
    async function updateProfile() {
        const formData = new FormData();
        formData.append('username', currentUser);
        formData.append('bio', document.getElementById('profileBio').value);
        const avatarFile = document.getElementById('avatarFile').files[0];
        if (avatarFile) formData.append('avatar', avatarFile);
        
        const res = await fetch('/update_profile', { method: 'POST', body: formData });
        if (res.ok) {
            alert("Профиль обновлён!");
            closeModal('profileModal');
            await loadUserData();
        } else {
            alert("Ошибка");
        }
    }
    
    // ========== ГРУППЫ ==========
    function showCreateGroupModal() {
        closeMenu();
        document.getElementById('createGroupModal').style.display = 'flex';
    }
    
    async function createGroup() {
        const name = document.getElementById('groupName').value;
        const desc = document.getElementById('groupDesc').value;
        const res = await fetch(`/group/create?name=${encodeURIComponent(name)}&description=${encodeURIComponent(desc)}&created_by=${currentUser}`, { method: 'POST' });
        if (res.ok) {
            alert("Группа создана!");
            closeModal('createGroupModal');
            await loadGroups();
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
        } else {
            alert("Ошибка");
        }
    }
    
    function refreshData() {
        loadGroups();
        alert("Данные обновлены");
    }
    
    // ========== МЕНЮ ==========
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('open');
    }
    function closeMenu() {
        document.getElementById('sideMenu').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('open');
    }
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    function logout() {
        if (confirm("Выйти из аккаунта?")) {
            if (ws) ws.close();
            location.reload();
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.addEventListener('resize', () => {
        isMobile = window.innerWidth <= 768;
        if (!isMobile) {
            document.getElementById('chatArea').classList.remove('active');
            document.getElementById('backBtn').style.display = 'none';
        }
    });
</script>
</body>
</html>
